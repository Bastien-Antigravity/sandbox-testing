# 🧪 Scenario: Web Interface Bootstrap Validation
# Spec: [[02-Business-BDD/02-Behavior-Specs/web-interface/FEAT-007-UI-Bootstrap]]

name: "Web Interface Bootstrap"
description: "Verify that the web-interface correctly initializes and connects to infrastructure."

steps:
  - action: "start_service"
    service: "log-server"
    args: ["cargo", "run"]
    description: "Launch the logging engine (Dependency)."

  - action: "wait"
    duration: 5
    description: "Awaiting Log-Server readiness."

  - action: "start_service"
    service: "config-server"
    args: ["go", "run", "cmd/config-server/main.go"]
    description: "Launch the config server (Dependency)."

  - action: "wait"
    duration: 5
    description: "Awaiting infrastructure synchronization."

  - action: "start_service"
    service: "web-interface"
    args: ["pwd && ls -F && go run cmd/web-interface/main.go"]
    description: "Launch the Web Interface with debug info."

  - action: "wait"
    duration: 10
    description: "Allowing time for full bootstrap and DB connection attempts."
