# Feature: Bootstrapping Fallback
# Spec: [[02-Business-BDD/02-Behavior-Specs/log-server/FEAT-009-Ecosystem-Bootstrapping]]
# Implementation: 02-Scenarios/go/config_resilience_test.go

name: "Bootstrapping Fallback Logic"
description: "Verifies that log-server can start using local standalone.yaml when the Config Server is unreachable."
version: "1.0.0"

steps:
  - action: "start_service"
    service: "log-server"
    args: "cargo run -- --name ResilienceTest"
    description: "Launch log-server WITHOUT launching config-server first."

  - action: "wait"
    duration: 5
    description: "Allowing time for toolbox to timeout on bridge and fallback to native file."
