# NATS Server Configuration
# This configuration use the minimal standard needed things, as compose already set some params...

# Server listening address and port
# managed by docker-compose
# listen: "127.0.0.1:4222"

# Server name (optional, useful for monitoring)
server_name: "nats-server"

# Enable JetStream
jetstream {
    # Enable JetStream functionality
    enabled: false
    # Storage directory for JetStream data
    store_dir: "./data"
    # Maximum memory JetStream can use (1GB)
    max_memory_store: 1073741824
    # Maximum disk space JetStream can use (20GB)
    max_file_store: 21474836480
}

# Logging configuration
debug: false
trace: false
logtime: true
# log_file: "/data/nats-server.log"

# Client connection limits
max_connections: 100
max_control_line: 4096
max_payload: 1048576  # 1MB - matches max_msg_size in config

# Timeouts (duration format required)
ping_interval: "2m"
ping_max: 3

# Write deadline for client connections
write_deadline: "5s"

# Authorization (optional - currently disabled for local development)
# authorization {
#     user: "nats_user"
#     password: "nats_password"
# }

# Monitoring endpoint (optional - useful for health checks)
http_port: 8222